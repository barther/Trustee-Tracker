    <script type="text/babel" data-presets="react">
      const { useState } = React;

      function PreviewApp() {
        const [view, setView] = useState('desktop');

        React.useEffect(() => {
          const onClick = (e) => {
            const btn = e.target.closest('[data-view]');
            if (!btn) return;
            const v = btn.getAttribute('data-view');
            setView(v);
            document.querySelectorAll('.preview-bar [data-view]').forEach((b) => {
              b.classList.toggle('active', b.getAttribute('data-view') === v);
            });
          };
          document.querySelector('.preview-bar').addEventListener('click', onClick);
          return () => document.querySelector('.preview-bar').removeEventListener('click', onClick);
        }, []);

        if (view === 'desktop') {
          return (
            <div className="desktop-frame">
              <BOperations />
            </div>
          );
        }
        if (view === 'mobile-agenda') {
          return (
            <div className="device">
              <MAgenda />
            </div>
          );
        }
        if (view === 'mobile-item') {
          return (
            <div className="device">
              <MItemDetail item={TT_DATA.agenda.oldBusiness.find((x) => x.id === 'kmac')} />
            </div>
          );
        }
        if (view === 'mobile-sheet') {
          return (
            <div className="device">
              <MAddUpdate />
            </div>
          );
        }
        return null;
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<PreviewApp />);
